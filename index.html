<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:linear-gradient(135deg,#04112f,#0a2c6b,#021126);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.15);
border-radius:24px;
padding:24px 18px;
text-align:center;
color:#fff;
box-shadow:0 10px 40px rgba(0,0,0,.35);
}
.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffd700;
box-shadow:0 0 25px rgba(255,215,0,.7);
}
h1{
margin-top:15px;
font-size:34px;
line-height:1.1;
color:#ffd700;
}
.tag{
margin-top:8px;
font-size:14px;
color:#ddd;
}
.features{
margin:20px 0;
padding:16px;
background:rgba(255,255,255,.05);
border-radius:18px;
}
.features p{
margin:10px 0;
font-size:14px;
}
.btn{
display:block;
width:100%;
padding:15px;
margin-top:14px;
border-radius:14px;
text-decoration:none;
font-weight:700;
font-size:16px;
background:linear-gradient(90deg,#00ff88,#00d4ff);
color:#000;
}
.note{
margin-top:18px;
font-size:15px;
color:#ffd700;
font-weight:600;
}
.small{
margin-top:8px;
font-size:12px;
color:#bdbdbd;
}
</style>
